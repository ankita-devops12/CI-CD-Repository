# name of the workflow
name: Hello
# run on automatic trigger, whenever change is pused to brach (deploy)
on: 
 push:
   branches: [main]
   #paths: '**html'
 # this are the Jobs inside the workflow
jobs:
  greet:
  # each job need separate runner
   runs-on: ubuntu-latest
   steps:
     - name: Say hello to user
       run: echo "Hello Dosto"
     - name: Say hello to user name
       run: echo "Hello $USER"

  details:
    runs-on: ubuntu-latest
    steps:
      - name: Version of Python and Docker
        run: docker --version && python --version
